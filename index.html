<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMarket | Next-Gen Creator Platform</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Modern Dark Theme & Variables */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #13131a;
            --bg-nav: #181824;
            --border: #262636;
            --accent-primary: #ff4e50;
            --accent-secondary: #f9d423;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        /* Top Navigation Bar */
        header {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-toggle-dashboard {
            background-color: transparent;
            color: var(--accent-secondary);
            border: 1px solid var(--accent-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-toggle-dashboard:hover {
            background-color: var(--accent-secondary);
            color: #000;
        }

        /* Live Platform Stats Hub */
        .stats-bar {
            background: linear-gradient(90deg, #13131a, #1c1c27);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            text-align: center;
        }

        .stat-item h3 {
            color: #fff;
            font-size: 20px;
        }

        .stat-item p {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Hero Header Search */
        .hero {
            text-align: center;
            padding: 50px 20px;
            background: radial-gradient(circle at top, #1e1b4b 0%, var(--bg-main) 70%);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background-color: var(--bg-card);
            color: #fff;
            font-size: 16px;
            outline: none
